<!--
ionicinit.min.js 的功能與說明：
push(name, title)：切換到目標頁，並回傳 Promise；約 100ms 後才 resolve，所以你可安全接 .then(...) 做「切頁後渲染」。
presentAlert(header=null, message=null, buttons=null)：快速顯示 Ionic Alert；流程是建立元件 → 設定內容/按鈕 → 顯示 → 移除，避免殘留 DOM。
presentActionSheet(header=null, subHeader=null, buttons=null)：給使用者一組操作選單（例如編輯/刪除/取消）；同樣會在關閉後清理元件。
presentToast(message=null, duration=1800, position='bottom', color=null)：短暫提示訊息（成功、錯誤、已儲存等），支援時間、位置、顏色與按鈕。
window.load 初始化段：動態載入 Ionic CDN 資源、建立 ion-app/ion-router/ion-nav、自動把所有 page-* 註冊成 route，最後呼叫 setUpIonic 完成啟動。

ionicinit.min.js 的使用方式：
1. 在 HTML 中使用 page-* 標籤定義頁面結構。
2. 在 JavaScript 中使用 push('page-xxx') 切換頁面。
3. 使用 presentAlert(...)、presentActionSheet(...)、presentToast(...) 顯示提示框。
-->
<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="BMI 計算器" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#3880ff" />
    <meta name="description" content="使用 Ionic 建立的 BMI 計算器與紀錄 PWA" />
    <title>BMI 計算器</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="shortcut icon apple-touch-icon" href="appicon.png" />
    <script src="ionicinit.min.js"></script>
    <style>
      :root {
        --ion-color-primary: #3880ff;
        --ion-color-primary-rgb: 56, 128, 255;
        --ion-color-primary-contrast: #ffffff;
        --ion-color-primary-contrast-rgb: 255, 255, 255;
        --ion-color-primary-shade: #3171e0;
        --ion-color-primary-tint: #4c8dff;
      }
      .intro-text {
        color: var(--ion-color-medium);
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 1rem;
      }
      .stat-card {
        margin-bottom: 1rem;
      }
      .stat-value {
        font-size: 1.75rem;
        font-weight: 600;
      }
      .stat-label {
        font-size: 0.85rem;
        color: var(--ion-color-medium);
      }
      .empty-state {
        text-align: center;
        padding: 2.5rem 1rem;
        color: var(--ion-color-medium);
      }
      .empty-state ion-icon {
        font-size: 4rem;
        opacity: 0.45;
        margin-bottom: 0.75rem;
      }
      .bmi-result-box {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 8px;
        background: var(--ion-color-light);
      }
      .bmi-result-box .bmi-num {
        font-size: 2rem;
        font-weight: 700;
      }
      .record-meta {
        font-size: 0.8rem;
        color: var(--ion-color-medium);
      }
    </style>
  </head>

  <body>
    <page-home>
      <ion-header>
        <ion-toolbar color="primary">
          <ion-title>BMI 計算器</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <h1 class="ion-no-margin" style="font-size: 1.35rem;">歡迎使用</h1>
        <p class="intro-text">
          輸入身高與體重即可計算 BMI，並將結果儲存在本機，隨時查看歷史紀錄。
        </p>

        <ion-card class="stat-card">
          <ion-card-header>
            <ion-card-subtitle>紀錄總數</ion-card-subtitle>
            <ion-card-title><span id="home-record-count" class="stat-value">0</span></ion-card-title>
          </ion-card-header>
        </ion-card>

        <ion-card class="stat-card">
          <ion-card-header>
            <ion-card-subtitle>最新 BMI</ion-card-subtitle>
            <ion-card-title>
              <span id="home-latest-bmi" class="stat-value">—</span>
              <div id="home-latest-category" class="stat-label ion-margin-top"></div>
            </ion-card-title>
          </ion-card-header>
        </ion-card>

        <ion-button expand="block" shape="round" onclick="goCalculator()">
          <ion-icon slot="start" name="calculator-outline"></ion-icon>
          開始計算
        </ion-button>
        <ion-button expand="block" fill="outline" shape="round" class="ion-margin-top" onclick="goRecords()">
          <ion-icon slot="start" name="list-outline"></ion-icon>
          查看紀錄
        </ion-button>
      </ion-content>
    </page-home>

    <page-calculator>
      <ion-header>
        <ion-toolbar color="primary">
          <ion-buttons slot="start">
            <ion-back-button defaultHref="/"></ion-back-button>
          </ion-buttons>
          <ion-title>BMI 計算</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-list lines="full">
          <ion-item>
            <ion-label position="stacked">姓名</ion-label>
            <ion-input id="calc-name" type="text" placeholder="請輸入姓名" maxlength="40"></ion-input>
          </ion-item>
          <ion-item>
            <ion-label position="stacked">身高（cm）</ion-label>
            <ion-input id="calc-height" type="number" inputmode="decimal" placeholder="例如 170"></ion-input>
          </ion-item>
          <ion-item>
            <ion-label position="stacked">體重（kg）</ion-label>
            <ion-input id="calc-weight" type="number" inputmode="decimal" placeholder="例如 65"></ion-input>
          </ion-item>
        </ion-list>

        <ion-button expand="block" shape="round" class="ion-margin-top" onclick="calculateAndSaveBMI()">
          計算並儲存
        </ion-button>

        <div id="calc-result-wrap" class="bmi-result-box" style="display: none;">
          <div class="stat-label">您的 BMI</div>
          <div id="calc-bmi-value" class="bmi-num"></div>
          <div id="calc-bmi-category" class="ion-margin-top"></div>
        </div>
      </ion-content>
    </page-calculator>

    <page-records>
      <ion-header>
        <ion-toolbar color="primary">
          <ion-buttons slot="start">
            <ion-back-button defaultHref="/"></ion-back-button>
          </ion-buttons>
          <ion-title>紀錄</ion-title>
          <ion-buttons slot="end">
            <ion-button id="btn-clear-records" onclick="confirmClearAllRecords()">
              <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <div id="records-empty" class="empty-state" style="display: none;">
          <ion-icon name="document-text-outline"></ion-icon>
          <p>尚無紀錄<br />請先到計算頁新增一筆 BMI 紀錄。</p>
        </div>
        <div id="records-list"></div>
      </ion-content>
    </page-records>

    <script>
      var STORAGE_KEY = 'bmi_calculator_records_v1';

      function loadRecords() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function saveRecords(records) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      function round1(n) {
        return Math.round(n * 10) / 10;
      }

      function computeBMI(heightCm, weightKg) {
        var h = heightCm / 100;
        return weightKg / (h * h);
      }

      function getBMICategory(bmi) {
        if (bmi < 18.5) return '過輕';
        if (bmi <= 23.9) return '正常';
        if (bmi <= 26.9) return '過重';
        if (bmi <= 29.9) return '輕度肥胖';
        if (bmi <= 34.9) return '中度肥胖';
        return '重度肥胖';
      }

      function updateHomeStats() {
        var records = loadRecords();
        var countEl = document.getElementById('home-record-count');
        var bmiEl = document.getElementById('home-latest-bmi');
        var catEl = document.getElementById('home-latest-category');
        if (!countEl || !bmiEl || !catEl) return;
        countEl.textContent = String(records.length);
        if (records.length === 0) {
          bmiEl.textContent = '—';
          catEl.textContent = '';
          return;
        }
        var latest = records[0];
        bmiEl.textContent = String(latest.bmi);
        catEl.textContent = latest.category + ' · ' + latest.name;
      }

      function goCalculator() {
        push('page-calculator', 'BMI 計算').then(function () {
          var wrap = document.getElementById('calc-result-wrap');
          if (wrap) wrap.style.display = 'none';
        });
      }

      function goRecords() {
        push('page-records', '紀錄').then(function () {
          renderRecords();
        });
      }

      function validateCalculatorInputs() {
        var nameEl = document.getElementById('calc-name');
        var hEl = document.getElementById('calc-height');
        var wEl = document.getElementById('calc-weight');
        var name = (nameEl && nameEl.value) ? String(nameEl.value).trim() : '';
        var hStr = hEl ? hEl.value : '';
        var wStr = wEl ? wEl.value : '';
        if (!name) {
          presentToast('請輸入姓名', 2000, 'bottom', 'warning');
          return null;
        }
        var heightCm = parseFloat(hStr);
        var weightKg = parseFloat(wStr);
        if (isNaN(heightCm) || heightCm <= 0 || heightCm > 300) {
          presentToast('請輸入合理身高（cm）', 2000, 'bottom', 'warning');
          return null;
        }
        if (isNaN(weightKg) || weightKg <= 0 || weightKg > 500) {
          presentToast('請輸入合理體重（kg）', 2000, 'bottom', 'warning');
          return null;
        }
        return { name: name, heightCm: heightCm, weightKg: weightKg };
      }

      function calculateAndSaveBMI() {
        var input = validateCalculatorInputs();
        if (!input) return;
        var bmiRaw = computeBMI(input.heightCm, input.weightKg);
        var bmi = round1(bmiRaw);
        var category = getBMICategory(bmiRaw);

        var records = loadRecords();
        records.unshift({
          id: Date.now(),
          name: input.name,
          heightCm: input.heightCm,
          weightKg: input.weightKg,
          bmi: bmi,
          category: category,
          createdAt: Date.now()
        });
        saveRecords(records);

        var wrap = document.getElementById('calc-result-wrap');
        var valEl = document.getElementById('calc-bmi-value');
        var catEl = document.getElementById('calc-bmi-category');
        if (wrap && valEl && catEl) {
          wrap.style.display = 'block';
          valEl.textContent = String(bmi);
          catEl.innerHTML = '<strong>' + category + '</strong>';
        }

        updateHomeStats();
        presentToast('已儲存 BMI 紀錄', 1800, 'bottom', 'success');
      }

      function renderRecords() {
        var records = loadRecords();
        var emptyEl = document.getElementById('records-empty');
        var listEl = document.getElementById('records-list');
        var clearBtn = document.getElementById('btn-clear-records');
        if (!emptyEl || !listEl) return;

        if (records.length === 0) {
          emptyEl.style.display = 'block';
          listEl.innerHTML = '';
          if (clearBtn) clearBtn.style.display = 'none';
          return;
        }
        emptyEl.style.display = 'none';
        if (clearBtn) clearBtn.style.display = '';

        var html = '';
        for (var i = 0; i < records.length; i++) {
          var r = records[i];
          var dateStr = formatRecordDate(r.createdAt);
          html +=
            '<ion-card>' +
            '<ion-card-header>' +
            '<ion-card-subtitle class="record-meta">' + escapeHtml(dateStr) + '</ion-card-subtitle>' +
            '<ion-card-title>' + escapeHtml(r.name) + '</ion-card-title>' +
            '</ion-card-header>' +
            '<ion-card-content>' +
            '<p>BMI <strong>' + escapeHtml(String(r.bmi)) + '</strong> · ' + escapeHtml(r.category) + '</p>' +
            '<p class="record-meta">身高 ' + escapeHtml(String(r.heightCm)) + ' cm · 體重 ' + escapeHtml(String(r.weightKg)) + ' kg</p>' +
            '</ion-card-content>' +
            '</ion-card>';
        }
        listEl.innerHTML = html;
      }

      function formatRecordDate(ts) {
        try {
          var d = new Date(ts);
          return d.toLocaleString('zh-TW', { dateStyle: 'medium', timeStyle: 'short' });
        } catch (e) {
          return '';
        }
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function confirmClearAllRecords() {
        var records = loadRecords();
        if (records.length === 0) {
          presentToast('沒有可清除的紀錄', 1800, 'bottom', 'medium');
          return;
        }
        presentAlert(
          '清除全部紀錄',
          '確定要刪除所有 BMI 紀錄嗎？此動作無法復原。',
          [
            { text: '取消', role: 'cancel' },
            {
              text: '全部清除',
              role: 'destructive',
              handler: function () {
                saveRecords([]);
                updateHomeStats();
                renderRecords();
                presentToast('已清除全部紀錄', 1800, 'bottom', 'success');
              }
            }
          ]
        );
      }

      window.addEventListener('load', function () {
        setTimeout(function () {
          updateHomeStats();
        }, 400);
      });
    </script>
  </body>
</html>
